# Gruvbox Dark Hard color scheme

# Status bar
set -g status-style "bg=default,fg=#d4be98"
set -g status-left "#[bg=default,fg=#d4be98,bold] #S #[default] "
set -g status-right "#[bg=default,fg=#a89984] %H:%M %d-%b-%y "
set -g status-left-length 40
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[bg=default,fg=#a89984] #I #W "
set -g window-status-current-format "#[bg=default,fg=#d8a657,bold] #I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#665c54"
set -g pane-active-border-style "fg=#d8a657"
set -g pane-border-lines heavy

# Messages and command line
set -g message-style "bg=#32302f,fg=#d4be98"

# Copy mode highlight
set -g mode-style "bg=#32302f,fg=#d4be98"

# Clock
set -g clock-mode-colour "#d8a657"

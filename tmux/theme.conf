# Catppuccin Latte theme for tmux

# Status bar
set -g status-style "bg=default,fg=#4c4f69"
set -g status-left "#[bg=default,fg=#4c4f69,bold] #S #[default] "
set -g status-right "#[bg=default,fg=#5c5f77] %H:%M %d-%b-%y "
set -g status-left-length 40
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[bg=default,fg=#5c5f77] #I #W "
set -g window-status-current-format "#[bg=default,fg=#1e66f5,bold] #I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"

# Messages and command line
set -g message-style "bg=#e6e9ef,fg=#4c4f69"

# Copy mode highlight
set -g mode-style "bg=#bcc0cc,fg=#4c4f69"

# Clock
set -g clock-mode-colour "#1e66f5"

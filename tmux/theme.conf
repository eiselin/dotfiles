# Tokyo Night theme for tmux

# Status bar
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left "#[bg=default,fg=#c0caf5,bold] #S #[default] "
set -g status-right "#[bg=default,fg=#a9b1d6] %H:%M %d-%b-%y "
set -g status-left-length 40
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[bg=default,fg=#a9b1d6] #I #W "
set -g window-status-current-format "#[bg=default,fg=#7aa2f7,bold] #I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages and command line
set -g message-style "bg=#292e42,fg=#c0caf5"

# Copy mode highlight
set -g mode-style "bg=#364a82,fg=#c0caf5"

# Clock
set -g clock-mode-colour "#7aa2f7"

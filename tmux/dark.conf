
# GitHub Dark theme — override Catppuccin @thm_ palette
# These must be set BEFORE TPM runs so they take precedence over -ogq defaults

# Base colors
set -g @thm_bg "#0d1117"           # GitHub Dark canvas default
set -g @thm_fg "#e6edf3"           # GitHub Dark foreground default

# Accent colors
set -g @thm_rosewater "#db61a2"    # GitHub Dark done/pink
set -g @thm_flamingo "#f85149"     # GitHub Dark danger
set -g @thm_pink "#db61a2"         # GitHub Dark done/pink
set -g @thm_mauve "#58a6ff"        # GitHub Dark accent blue
set -g @thm_red "#f85149"          # GitHub Dark danger
set -g @thm_maroon "#f85149"       # GitHub Dark danger
set -g @thm_peach "#d18616"        # GitHub Dark severe/orange
set -g @thm_yellow "#d29922"       # GitHub Dark attention
set -g @thm_green "#3fb950"        # GitHub Dark success
set -g @thm_teal "#58a6ff"         # GitHub Dark accent blue
set -g @thm_sky "#79c0ff"          # GitHub Dark open/blue
set -g @thm_sapphire "#388bfd"     # GitHub Dark accent emphasis
set -g @thm_blue "#58a6ff"         # GitHub Dark accent blue
set -g @thm_lavender "#58a6ff"     # GitHub Dark accent blue

# Surfaces and overlays
set -g @thm_subtext_1 "#c9d1d9"    # GitHub Dark foreground muted
set -g @thm_subtext_0 "#8b949e"    # GitHub Dark foreground muted
set -g @thm_overlay_2 "#6e7681"    # GitHub Dark neutral muted
set -g @thm_overlay_1 "#484f58"    # GitHub Dark border muted
set -g @thm_overlay_0 "#30363d"    # GitHub Dark border default
set -g @thm_surface_2 "#30363d"    # GitHub Dark border default
set -g @thm_surface_1 "#21262d"    # GitHub Dark border subtle
set -g @thm_surface_0 "#161b22"    # GitHub Dark canvas subtle
set -g @thm_mantle "#010409"       # GitHub Dark canvas inset
set -g @thm_crust "#010409"        # GitHub Dark canvas inset

# Direct tmux style overrides
set -g status-bg "#161b22"
set -g status-fg "#e6edf3"
set -g pane-border-style fg="#30363d"
set -g pane-active-border-style fg="#58a6ff"
set -g message-style fg="#e6edf3",bg="#30363d"

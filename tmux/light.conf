# GitHub Light color scheme

# Status bar
set -g status-style "bg=default,fg=#1f2328"
set -g status-left "#[bg=default,fg=#1f2328,bold] #S #[default] "
set -g status-right "#[bg=default,fg=#59636e] %H:%M %d-%b-%y "
set -g status-left-length 40
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[bg=default,fg=#656d76] #I #W "
set -g window-status-current-format "#[bg=default,fg=#0969da,bold] #I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#d1d9e0"
set -g pane-active-border-style "fg=#0969da"

# Messages and command line
set -g message-style "bg=#fff8c5,fg=#1f2328"

# Copy mode highlight
set -g mode-style "bg=#ddf4ff,fg=#1f2328"

# Clock
set -g clock-mode-colour "#0969da"

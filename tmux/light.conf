# Tokyo Night Day theme for tmux

# Status bar
set -g status-style "bg=default,fg=#3760bf"
set -g status-left "#[bg=default,fg=#3760bf,bold] #S #[default] "
set -g status-right "#[bg=default,fg=#6172b0] %H:%M %d-%b-%y "
set -g status-left-length 40
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[bg=default,fg=#6172b0] #I #W "
set -g window-status-current-format "#[bg=default,fg=#2e7de9,bold] #I #W "
set -g window-status-separator ""
set -g allow-rename off

# Pane borders
set -g pane-border-style "fg=#c4c8da"
set -g pane-active-border-style "fg=#2e7de9"

# Messages and command line
set -g message-style "bg=#d5d6db,fg=#3760bf"

# Copy mode highlight
set -g mode-style "bg=#c4c8da,fg=#3760bf"

# Clock
set -g clock-mode-colour "#2e7de9"

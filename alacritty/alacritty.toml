general.import = [
    "~/.config/alacritty/themes/themes/github_light_default.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
dimensions = { columns = 175, lines = 50 }

decorations = "Buttonless"

opacity = 0.88
blur = true

option_as_alt = "Both"

[font]
normal.family = "MesloLGS Nerd Font Mono"

size = 15

[[keyboard.bindings]]
key = "Return"
mods = "Command"
action = "ToggleFullscreen"
